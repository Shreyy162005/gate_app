<!DOCTYPE html>
<html>
<head>
    <title>Login - GATE Portal</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.95);
            color: black;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 14px;
            color: #555;
            margin-bottom: 25px;
            font-style: italic;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 10px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            border-color: #2c5364;
            box-shadow: 0 0 5px rgba(44,83,100,0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1e3c4d;
        }

        .error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
        }

        .register {
            margin-top: 15px;
            font-size: 14px;
        }

        .register a {
            text-decoration: none;
            color: #2c5364;
            font-weight: 500;
        }

        .register a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>
    <p class="tagline">Continue your preparation</p>

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <label>Username</label>
        <input type="text" name="name" placeholder="Enter your username" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <div class="register">
        Don't have an account? <a href="{% url 'register' %}">Register</a>
    </div>
</div>

</body>
</html>
